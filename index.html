<style>
    /* ... (Mantener estilos anteriores de .card, #canvas-bg, .floating-tools) ... */

    /* NOTA: Eliminamos la transición de borde para que el feedback sea instantáneo al tocar */
    .nota { 
        position: absolute; background: white; border-radius: 12px; 
        width: 250px; min-height: 120px; color: #111; 
        box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 10;
        display: flex; flex-direction: column; overflow: visible;
        touch-action: none; border: 2px solid transparent;
    }

    /* ESTADO SELECCIONADO: Reborde azul brillante permanente mientras esté activa */
    .nota.active-edit { 
        border: 2px solid var(--accent-blue);
        box-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
        z-index: 100; /* Poner al frente al editar */
    }
    
    .resize-dot {
        position: absolute; width: 12px; height: 12px;
        background: var(--accent-blue); border: 2px solid white;
        border-radius: 50%; display: none; z-index: 101;
    }
    .nota.active-edit .resize-dot { display: block; }
    .dot-br { bottom: -6px; right: -6px; cursor: nwse-resize; }
    .dot-tr { top: -6px; right: -6px; cursor: nesw-resize; }
    .dot-bl { bottom: -6px; left: -6px; cursor: nesw-resize; }

    /* Estilo para el botón de borrar cuando está habilitado */
    .tool-btn.delete-mode { color: #ff4d4d; }
    .tool-btn.delete-mode:active { background: rgba(255, 77, 77, 0.2); }
</style>

<div id="canvas-view">
    <button onclick="cerrarLienzo()" style="position:fixed; top:20px; left:20px; z-index:3000; background:var(--ui-glass); border:1px solid #30363d; color:white; padding:10px 18px; border-radius:50px; cursor:pointer;">← Salir</button>
    <div id="canvas-bg" data-x="0" data-y="0" onclick="deseleccionarTodo(event)"></div>
    
    <div class="floating-tools">
        <button class="tool-btn">⛶</button>
        <button class="tool-btn">⚙</button>
        <div class="divider"></div>
        <button class="tool-btn">✎</button>
        <button class="tool-btn active" onclick="crearNotaLienzo()">T</button>
        <button id="del-btn" class="tool-btn" onclick="eliminarSeleccionado()">🗑️</button>
        <div class="divider"></div>
        <button class="tool-btn" onclick="cerrarLienzo()">🏠</button>
    </div>
</div>

<script>
    let notaSeleccionada = null;

    // Función para quitar la selección si tocas el fondo del lienzo
    function deseleccionarTodo(e) {
        if (e.target.id === "canvas-bg") {
            if (notaSeleccionada) {
                notaSeleccionada.classList.remove('active-edit');
                notaSeleccionada = null;
                document.getElementById('del-btn').classList.remove('delete-mode');
            }
        }
    }

    function eliminarSeleccionado() {
        if (notaSeleccionada) {
            if(confirm("¿Eliminar este apunte?")) {
                notaSeleccionada.remove();
                notaSeleccionada = null;
                document.getElementById('del-btn').classList.remove('delete-mode');
            }
        } else {
            alert("Toca una nota primero para seleccionarla");
        }
    }

    function crearNotaLienzo() {
        const div = document.createElement('div');
        div.className = 'nota';
        div.style.left = "200px"; div.style.top = "200px";
        div.innerHTML = `
            <div class="handle">⠿ MOVER</div>
            <textarea placeholder="Escribir..."></textarea>
            <div class="resize-dot dot-br"></div>
            <div class="resize-dot dot-tr"></div>
            <div class="resize-dot dot-bl"></div>
        `;
        
        // Al hacer clic en la nota, se selecciona
        div.addEventListener('mousedown', function() { seleccionarNota(div); });
        div.addEventListener('touchstart', function() { seleccionarNota(div); });

        document.getElementById('canvas-bg').appendChild(div);

        configurarInteract(div);
    }

    function seleccionarNota(el) {
        if (notaSeleccionada) notaSeleccionada.classList.remove('active-edit');
        notaSeleccionada = el;
        notaSeleccionada.classList.add('active-edit');
        document.getElementById('del-btn').classList.add('delete-mode');
    }

    function configurarInteract(el) {
        interact(el)
        .draggable({
            allowFrom: '.handle',
            listeners: { move(event) {
                const t = event.target;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
            }}
        })
        .resizable({
            edges: { right: true, bottom: true, top: true },
            listeners: { move(event) {
                const t = event.target;
                let x = (parseFloat(t.getAttribute('data-x')) || 0);
                let y = (parseFloat(t.getAttribute('data-y')) || 0);
                t.style.width = event.rect.width + 'px';
                t.style.height = event.rect.height + 'px';
                x += event.deltaRect.left;
                y += event.deltaRect.top;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
            }},
            modifiers: [ interact.modifiers.restrictSize({ min: { width: 160, height: 100 } }) ]
        });
    }

    // ... (El resto del código de base de datos y navegación se mantiene igual) ...
</script>
