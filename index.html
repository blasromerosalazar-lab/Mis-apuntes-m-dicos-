<style>
    /* ... (Estilos de .nota, .selected, .resize-dot, etc. se mantienen igual) ... */
    
    /* Pequeña mejora: Cursor de mano cuando es para mover */
    .handle { cursor: grab; }
    .handle:active { cursor: grabbing; }

    /* Deshabilitar selección de texto accidental al mover en tablet */
    .nota { user-select: none; }
    textarea { user-select: text; }
</style>

<script>
    let db = JSON.parse(localStorage.getItem('mednotes_v5_db')) || { materias: [], recientes: [] };
    let notaActiva = null;
    let timerPresion; // Para detectar el segundo de presión

    // ... (Funciones de navegación y renderizar se mantienen igual) ...

    function crearNotaLienzo() {
        const div = document.createElement('div');
        div.className = 'nota';
        div.style.left = "150px"; div.style.top = "150px";
        div.innerHTML = `
            <div class="handle">⠿ MOVER</div>
            <textarea placeholder="Escribir..."></textarea>
            <div class="resize-dot dot-br"></div>
            <div class="resize-dot dot-tr"></div>
            <div class="resize-dot dot-bl"></div>
        `;
        
        // LÓGICA DE PRESIÓN LARGA
        div.addEventListener('pointerdown', (e) => {
            // Si ya está seleccionada, no hacemos nada más
            if (div.classList.contains('selected')) return;

            timerPresion = setTimeout(() => {
                seleccionar(div);
            }, 800); // 800ms para que se sienta fluido pero seguro
        });

        div.addEventListener('pointerup', () => clearTimeout(timerPresion));
        div.addEventListener('pointermove', () => clearTimeout(timerPresion));

        document.getElementById('canvas-bg').appendChild(div);
        configurarInteract(div);
    }

    function seleccionar(el) {
        deseleccionar();
        notaActiva = el;
        el.classList.add('selected');
        document.getElementById('delete-tool').classList.add('enabled');
        
        // Habilitar el redimensionamiento solo cuando está seleccionada
        interact(el).resizable({ enabled: true });
    }

    function deseleccionar() {
        if (notaActiva) {
            notaActiva.classList.remove('selected');
            // Deshabilitar resize al deseleccionar para que no estorbe al mover
            interact(notaActiva).resizable({ enabled: false });
            notaActiva = null;
        }
        document.getElementById('delete-tool').classList.remove('enabled');
    }

    function configurarInteract(el) {
        interact(el)
        .draggable({
            allowFrom: '.handle',
            listeners: { 
                move(event) {
                    const t = event.target;
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                }
            }
        })
        .resizable({
            enabled: false, // Empieza deshabilitado por defecto
            edges: { right: true, bottom: true, top: true },
            listeners: { 
                move(event) {
                    const t = event.target;
                    let x = (parseFloat(t.getAttribute('data-x')) || 0);
                    let y = (parseFloat(t.getAttribute('data-y')) || 0);
                    t.style.width = event.rect.width + 'px';
                    t.style.height = event.rect.height + 'px';
                    x += event.deltaRect.left;
                    y += event.deltaRect.top;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                }
            },
            modifiers: [ interact.modifiers.restrictSize({ min: { width: 160, height: 100 } }) ]
        });
    }

    // ... (Función eliminarNota y paneo del lienzo igual) ...
</script>
