<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedNotes v1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; touch-action: none; }
        #canvas { width: 3000px; height: 3000px; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 30px 30px; position: relative; }
        
        .nota { 
            position: absolute; background: white; border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 220px;
            padding: 5px; z-index: 10; touch-action: none;
        }
        /* La barra gris para mover */
        .handle { 
            background: #eee; height: 30px; border-radius: 5px; 
            cursor: move; display: flex; align-items: center; 
            justify-content: center; font-size: 12px; color: #666; font-weight: bold;
        }
        .nota textarea { 
            width: 95%; height: 100px; border: none; outline: none; 
            font-size: 16px; padding: 5px; margin-top: 5px;
            touch-action: auto !important; /* Esto obliga a permitir el toque para escribir */
        }
        #toolbar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); padding: 10px 20px; border-radius: 50px; 
            display: flex; gap: 10px; z-index: 1000;
        }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="canvas"></div>

<div id="toolbar">
    <button onclick="nuevaNota()">+ Nueva Nota</button>
    <button onclick="location.reload()" style="background:#95a5a6;">Actualizar</button>
</div>

<script>
    let notasData = JSON.parse(localStorage.getItem('medNotes')) || [];

    window.onload = () => {
        notasData.forEach(data => renderizarNota(data.id, data.x, data.y, data.texto));
    }

    function nuevaNota() {
        const id = Date.now();
        const data = { id: id, x: 50, y: 50, texto: "" };
        notasData.push(data);
        renderizarNota(id, 50, 50, "");
        guardar();
    }

    function renderizarNota(id, x, y, texto) {
        const div = document.createElement('div');
        div.className = 'nota';
        div.id = id;
        div.style.transform = `translate(${x}px, ${y}px)`;
        div.setAttribute('data-x', x);
        div.setAttribute('data-y', y);
        
        div.innerHTML = `
            <div class="handle">⠿ MOVER AQUÍ</div>
            <textarea placeholder="Escribir...">${texto}</textarea>
        `;
        
        document.getElementById('canvas').appendChild(div);

        const areaTexto = div.querySelector('textarea');
        areaTexto.oninput = (e) => actualizarTexto(id, e.target.value);

        interact(div).draggable({
            allowFrom: '.handle', 
            listeners: {
                move(event) {
                    const target = event.target;
                    const nx = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const ny = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = `translate(${nx}px, ${ny}px)`;
                    target.setAttribute('data-x', nx);
                    target.setAttribute('data-y', ny);
                    actualizarPosicion(id, nx, ny);
                },
                end() { guardar(); }
            }
        });
    }

    function actualizarTexto(id, valor) {
        const nota = notasData.find(n => n.id === id);
        if(nota) nota.texto = valor;
        guardar();
    }

    function actualizarPosicion(id, x, y) {
        const nota = notasData.find(n => n.id === id);
        if(nota) { nota.x = x; nota.y = y; }
    }

    function guardar() {
        localStorage.setItem('medNotes', JSON.stringify(notasData));
    }
</script>
</body>
</html>
