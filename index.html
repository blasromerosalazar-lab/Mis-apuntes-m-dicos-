<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedNotes v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        
        /* El lienzo infinito */
        #canvas { 
            width: 5000px; height: 5000px; 
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1.5px); 
            background-size: 40px 40px; 
            position: relative; touch-action: none;
        }

        /* Estilo de las notas */
        .nota { 
            position: absolute; background: white; border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 250px;
            padding: 10px; border-top: 5px solid var(--accent);
            touch-action: none; z-index: 10;
        }
        .nota textarea { 
            width: 100%; height: 120px; border: none; outline: none; 
            font-size: 16px; color: #333; resize: none; background: transparent;
        }

        /* Menú Inferior */
        #toolbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); padding: 12px 25px; border-radius: 50px; 
            display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000;
        }
        button { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="canvas">
    </div>

<div id="toolbar">
    <button onclick="nuevaNota()">+ Nota de Clase</button>
    <button style="background: #e67e22;">+ Ver 3D (Próximamente)</button>
</div>

<script>
    let notasData = JSON.parse(localStorage.getItem('medNotes')) || [];

    window.onload = () => {
        notasData.forEach(data => renderizarNota(data.id, data.x, data.y, data.texto));
    }

    function nuevaNota() {
        const id = Date.now();
        const data = { id: id, x: 50, y: 50, texto: "" };
        notasData.push(data);
        renderizarNota(id, 50, 50, "");
        guardar();
    }

    function renderizarNota(id, x, y, texto) {
        const div = document.createElement('div');
        div.className = 'nota';
        div.id = id;
        div.style.transform = translate(${x}px, ${y}px);
        div.setAttribute('data-x', x);
        div.setAttribute('data-y', y);
        
        div.innerHTML = 
            <div class="handle" style="font-size: 10px; color: #666; margin-bottom: 5px; cursor:grab; background:#eee; padding:5px; border-radius:4px; text-align:center;">⠿ ARRASTRAR AQUÍ</div>
            <textarea oninput="actualizarTexto(${id}, this.value)">${texto}</textarea>
        ;
        
        document.getElementById('canvas').appendChild(div);

        interact(div).draggable({
            allowFrom: '.handle', 
            listeners: {
                move(event) {
                    const target = event.target;
                    const nx = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const ny = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = translate(${nx}px, ${ny}px);
                    target.setAttribute('data-x', nx);
                    target.setAttribute('data-y', ny);
                    actualizarPosicion(id, nx, ny);
                },
                end() { guardar(); }
            }
        });
    }

    function actualizarTexto(id, valor) {
        const nota = notasData.find(n => n.id === id);
        if(nota) nota.texto = valor;
        guardar();
    }

    function actualizarPosicion(id, x, y) {
        const nota = notasData.find(n => n.id === id);
        if(nota) { nota.x = x; nota.y = y; }
    }

    function guardar() {
        localStorage.setItem('medNotes', JSON.stringify(notasData));
    }

    function borrarTodo() {
        if(confirm("¿Borrar todos los apuntes?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
