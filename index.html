<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedNotes Canvas</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --bg-dark: #0b0e14; 
            --ui-bg: rgba(22, 27, 34, 0.85); /* Transparencia estilo moderno */
            --accent-blue: #3498db;
            --border: #30363d;
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }

        /* LIENZO OSCURO Y PUNTEADO */
        #canvas-container {
            width: 100vw; height: 100vh;
            overflow: hidden; background-color: var(--bg-dark);
            background-image: radial-gradient(#2f353c 1.5px, transparent 1.5px);
            background-size: 40px 40px; /* Tamaño del punteado */
            position: relative;
        }

        #canvas-content {
            width: 5000px; height: 5000px;
            position: absolute; top: 0; left: 0;
        }

        /* BARRA DE HERRAMIENTAS ESTILO REFERENCIA */
        .toolbar-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--ui-bg);
            backdrop-filter: blur(10px); /* Efecto cristal */
            padding: 8px 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .tool-btn {
            width: 42px; height: 42px;
            border-radius: 10px;
            border: 1px solid transparent;
            background: transparent;
            color: #8b949e;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px;
            transition: 0.2s;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .tool-btn.active { background: rgba(52, 152, 219, 0.2); color: var(--accent-blue); border-color: var(--accent-blue); }

        .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

        /* NOTAS */
        .nota { 
            position: absolute; background: white; border-radius: 12px; 
            width: 250px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 10; color: #111; overflow: hidden;
        }
        .handle { background: #f0f0f0; height: 30px; cursor: move; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 10px; font-size: 10px; font-weight: bold; color: #666; }
        textarea { width: 100%; height: 120px; border: none; outline: none; padding: 12px; font-size: 16px; box-sizing: border-box; resize: none; background: transparent; }

        /* BOTÓN VOLVER */
        .btn-exit {
            position: fixed; top: 20px; left: 20px;
            background: var(--ui-bg); border: 1px solid var(--border);
            color: white; padding: 10px 20px; border-radius: 50px;
            cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

<button class="btn-exit" onclick="location.href='index.html'">← Menú</button>

<div id="canvas-container">
    <div id="canvas-content">
        </div>
</div>

<div class="toolbar-container">
    <button class="tool-btn" title="Expandir">⛶</button>
    <button class="tool-btn" title="Ver">👁</button>
    <button class="tool-btn" title="Ajustes">⚙</button>
    <div class="divider"></div>
    <button class="tool-btn" title="Lápiz">✎</button>
    <button class="tool-btn" title="Borrador">⌫</button>
    <button class="tool-btn active" title="Texto" onclick="nuevaNota()">T</button>
    <button class="tool-btn" title="Imágenes">🖼</button>
    <button class="tool-btn" title="Agregar">+</button>
    <div class="divider"></div>
    <button class="tool-btn" title="Seleccionar">⬚</button>
    <button class="tool-btn" title="Mano">✋</button>
    <div class="divider"></div>
    <button class="tool-btn" title="Deshacer">↶</button>
    <button class="tool-btn" title="Rehacer">↷</button>
    <button class="tool-btn" title="Menú">⋮</button>
</div>

<script>
    let notasData = JSON.parse(localStorage.getItem('medNotes')) || [];
    const canvas = document.getElementById('canvas-content');

    function nuevaNota() {
        const id = Date.now();
        const data = { id, x: 200, y: 200, texto: "" };
        notasData.push(data);
        renderizarNota(data);
        guardar();
    }

    function renderizarNota(data) {
        const div = document.createElement('div');
        div.className = 'nota';
        div.style.transform = `translate(${data.x}px, ${data.y}px)`;
        div.setAttribute('data-x', data.x); div.setAttribute('data-y', data.y);
        div.innerHTML = `<div class="handle">⠿ MOVER</div><textarea>${data.texto}</textarea>`;
        
        div.querySelector('textarea').oninput = (e) => {
            const n = notasData.find(item => item.id === data.id);
            if(n) n.texto = e.target.value;
            guardar();
        };

        canvas.appendChild(div);

        interact(div).draggable({
            allowFrom: '.handle',
            listeners: {
                move(event) {
                    const t = event.target;
                    const nx = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const ny = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    t.style.transform = `translate(${nx}px, ${ny}px)`;
                    t.setAttribute('data-x', nx); t.setAttribute('data-y', ny);
                    const n = notasData.find(item => item.id === data.id);
                    if(n) { n.x = nx; n.y = ny; }
                },
                end() { guardar(); }
            }
        });
    }

    // Cargar notas al inicio
    notasData.forEach(n => renderizarNota(n));

    function guardar() { localStorage.setItem('medNotes', JSON.stringify(notasData)); }

    // Mover el lienzo (Pan) con el dedo o mouse
    interact('#canvas-container').draggable({
        listeners: {
            move(event) {
                const t = canvas;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x);
                t.setAttribute('data-y', y);
            }
        }
    });
</script>
</body>
</html>
