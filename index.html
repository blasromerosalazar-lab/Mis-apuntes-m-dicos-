<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedNotes Pro - UCV</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --bg-dark: #0b0e14; 
            --card-dark: #161b22;
            --accent-blue: #3498db;
            --text-gray: #8b949e;
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Pantalla de Inicio */
        #home-screen { padding: 20px; padding-bottom: 100px; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Tarjetas Estilo Figma */
        .card { 
            background: var(--card-dark); border-radius: 12px; padding: 18px; 
            margin-bottom: 12px; border: 1px solid #30363d;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-info { flex: 1; }
        .card h3 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .card p { color: var(--text-gray); font-size: 13px; margin: 8px 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card .date { font-size: 11px; color: #484f58; }

        /* Lienzo de Apuntes */
        #canvas-screen { display: none; width: 3000px; height: 3000px; background-image: radial-gradient(#21262d 1px, transparent 1px); background-size: 30px 30px; position: relative; }
        .btn-back { position: fixed; top: 20px; left: 20px; z-index: 1002; background: var(--accent-blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }

        /* Notas */
        .nota { position: absolute; background: white; border-radius: 10px; width: 250px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 10; color: #222; }
        .handle { background: #f0f0f0; height: 30px; cursor: move; border-radius: 10px 10px 0 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #666; }
        textarea { width: 100%; height: 120px; border: none; outline: none; padding: 10px; font-size: 16px; box-sizing: border-box; resize: none; border-radius: 0 0 10px 10px; }

        /* Menú Inferior */
        #toolbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-gray); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }

        #add-btn { position: fixed; bottom: 90px; right: 20px; background: #238636; width: 60px; height: 60px; border-radius: 50%; border: none; color: white; font-size: 35px; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="header"><h1 id="main-title">Tus materias</h1><span style="font-size: 20px;">🔍</span></div>
    <div id="list-container"></div>
</div>

<div id="canvas-screen">
    <button class="btn-back" onclick="mostrarHome()">← Salir al Menú</button>
</div>

<button id="add-btn" onclick="nuevaNota()">+</button>

<div id="toolbar">
    <button class="nav-item active" onclick="mostrarHome()"><span>🏠</span>Reciente</button>
    <button class="nav-item" onclick="mostrarSeccionMaterias()"><span>📚</span>Materias</button>
    <button class="nav-item"><span>📦</span>Modelos 3D</button>
    <button class="nav-item"><span>👤</span>Yo</button>
</div>

<script>
    // Datos integrados de tu Figma
    const temas = [
        { id: 1, title: "Estructura del ADN", desc: "Síntesis simultánea y bidireccional...", color: "#4fc3f7", date: "10 Mar" },
        { id: 2, title: "Metabolismo del Hemo", desc: "Vías enzimáticas y regulación...", color: "#ff8a80", date: "08 Feb" },
        { id: 3, title: "Carbohidratos", desc: "Glucólisis y regulación enzimática...", color: "#ccff90", date: "08 Feb" },
        { id: 4, title: "Regulación Hormonal", desc: "Inducida por cAMP y fosforilación...", color: "#e0e0e0", date: "08 Feb" },
        { id: 5, title: "Catabolismo Aminoácidos", desc: "Glutamato y liberación de amoniaco...", color: "#80deea", date: "08 Feb" }
    ];

    const materias = [
        { id: 1, name: "Bioquímica", topics: 24, color: "#4fc3f7" },
        { id: 2, name: "Anatomía", topics: 18, color: "#ff8a80" },
        { id: 3, name: "Fisiología", topics: 31, color: "#ccff90" }
    ];

    let notasData = JSON.parse(localStorage.getItem('medNotes')) || [];

    // Al cargar, mostrar Recientes
    window.onload = mostrarHome;

    function mostrarHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('canvas-screen').style.display = 'none';
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('main-title').innerText = "Tus materias";
        actualizarNav(0);

        const container = document.getElementById('list-container');
        container.innerHTML = "";
        temas.forEach(t => {
            container.innerHTML += `
                <div class="card" onclick="abrirLienzo()">
                    <div class="card-info">
                        <h3 style="color: ${t.color}">${t.title}</h3>
                        <p>${t.desc}</p>
                        <span class="date">${t.date} de 2026</span>
                    </div>
                    <div style="font-size: 20px; color: #30363d;">📄</div>
                </div>
            `;
        });
    }

    function mostrarSeccionMaterias() {
        document.getElementById('main-title').innerText = "Categorías";
        actualizarNav(1);
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        materias.forEach(m => {
            container.innerHTML += `
                <div class="card" style="border-left: 6px solid ${m.color}">
                    <div class="card-info">
                        <h3 style="color: ${m.color}">${m.name}</h3>
                        <p>${m.topics} temas en esta carpeta</p>
                    </div>
                    <div style="font-size: 20px;">📁</div>
                </div>
            `;
        });
    }

    function actualizarNav(index) {
        const items = document.querySelectorAll('.nav-item');
        items.forEach(i => i.classList.remove('active'));
        items[index].classList.add('active');
    }

    function abrirLienzo() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('canvas-screen').style.display = 'block';
        document.getElementById('add-btn').style.display = 'block';
        renderizarNotas();
    }

    function nuevaNota() {
        const id = Date.now();
        const data = { id, x: 50, y: 100, texto: "" };
        notasData.push(data);
        renderizarNota(id, 50, 100, "");
        guardar();
    }

    function renderizarNotas() {
        const canvas = document.getElementById('canvas-screen');
        canvas.innerHTML = '<button class="btn-back" onclick="mostrarHome()">← Salir al Menú</button>';
        notasData.forEach(n => renderizarNota(n.id, n.x, n.y, n.texto));
    }

    function renderizarNota(id, x, y, texto) {
        const div = document.createElement('div');
        div.className = 'nota';
        div.style.transform = `translate(${x}px, ${y}px)`;
        div.setAttribute('data-x', x); div.setAttribute('data-y', y);
        div.innerHTML = `<div class="handle">⠿ MOVER</div><textarea placeholder="Escribir...">${texto}</textarea>`;
        
        div.querySelector('textarea').oninput = (e) => {
            const n = notasData.find(item => item.id === id);
            if(n) n.texto = e.target.value;
            guardar();
        };

        document.getElementById('canvas-screen').appendChild(div);

        interact(div).draggable({
            allowFrom: '.handle',
            listeners: {
                move(event) {
                    const t = event.target;
                    const nx = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const ny = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    t.style.transform = `translate(${nx}px, ${ny}px)`;
                    t.setAttribute('data-x', nx); t.setAttribute('data-y', ny);
                    const n = notasData.find(item => item.id === id);
                    if(n) { n.x = nx; n.y = ny; }
                },
                end() { guardar(); }
            }
        });
    }

    function guardar() { localStorage.setItem('medNotes', JSON.stringify(notasData)); }
</script>
</body>
</html>
