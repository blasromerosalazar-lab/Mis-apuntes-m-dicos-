<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedNotes Pro - UCV</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --bg-dark: #0b0e14; 
            --card-dark: #161b22;
            --accent-blue: #3498db;
            --text-gray: #8b949e;
            --ui-glass: rgba(22, 27, 34, 0.95);
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }

        /* INTERFAZ UCV RESTAURADA */
        #main-view { display: block; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        #canvas-view { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: var(--card-dark); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #30363d; cursor: pointer; }
        .card h3 { margin: 0; font-size: 15px; color: var(--accent-blue); text-transform: uppercase; }

        /* LIENZO PUNTEADO 40PX */
        #canvas-bg {
            width: 5000px; height: 5000px; position: absolute; top: 0; left: 0;
            background-image: radial-gradient(#2f353c 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }

        /* BARRA GLASSMORPHISM */
        .floating-tools {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: var(--ui-glass); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 20px; border: 1px solid #30363d;
            display: flex; gap: 12px; align-items: center; z-index: 2000;
        }
        .tool-btn { width: 44px; height: 44px; border-radius: 12px; border: none; background: transparent; color: #8b949e; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .tool-btn.active { color: var(--accent-blue); }
        .tool-btn.danger { color: #e74c3c; opacity: 0.2; pointer-events: none; }
        .tool-btn.danger.enabled { opacity: 1; pointer-events: auto; }

        /* NOTAS */
        .nota { 
            position: absolute; background: white; border-radius: 12px; 
            width: 250px; min-height: 120px; color: #111; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 10;
            display: flex; flex-direction: column; border: 2px solid transparent;
        }
        .nota.selected { border: 2px solid var(--accent-blue); }
        
        .resize-dot { position: absolute; width: 15px; height: 15px; background: var(--accent-blue); border: 2px solid white; border-radius: 50%; display: none; z-index: 100; bottom: -7px; right: -7px; }
        .nota.selected .resize-dot { display: block; }

        .handle { background: #f5f5f5; height: 35px; cursor: grab; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #999; border-bottom: 1px solid #ddd; touch-action: none; }
        textarea { width: 100%; flex-grow: 1; border: none; padding: 12px; box-sizing: border-box; resize: none; font-size: 16px; outline: none; background: transparent; }

        #add-btn { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: var(--accent-blue); border-radius: 50%; border: none; color: white; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header"><h1>Materias</h1></div>
    <div id="content-list">
        <div class="card" onclick="abrirLienzo()"><h3>Anatomía I</h3></div>
    </div>
    <button id="add-btn" onclick="ejecutarAccionMas()">+</button>
</div>

<div id="canvas-view">
    <div id="canvas-bg" data-x="0" data-y="0" onclick="deseleccionar()"></div>
    <div class="floating-tools">
        <button class="tool-btn" onclick="cerrarLienzo()">🏠</button>
        <button class="tool-btn active" onclick="crearNotaLienzo()">T</button>
        <button id="delete-tool" class="tool-btn danger" onclick="eliminarNota()">🗑️</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('mednotes_vUCV')) || { materias: [], recientes: [] };
    let notaActiva = null;
    let timerPresion;
    let zIndexGlobal = 100;

    function abrirLienzo() { document.getElementById('main-view').style.display = 'none'; document.getElementById('canvas-view').style.display = 'block'; }
    function cerrarLienzo() { document.getElementById('main-view').style.display = 'block'; document.getElementById('canvas-view').style.display = 'none'; }

    function crearNotaLienzo() {
        const div = document.createElement('div');
        div.className = 'nota';
        div.style.left = "100px"; div.style.top = "100px";
        div.innerHTML = `
            <div class="handle">⠿ MOVER</div>
            <textarea placeholder="Escribir..."></textarea>
            <div class="resize-dot"></div>
        `;
        
        // EVENTO PRESIÓN LARGA
        div.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            div.style.zIndex = ++zIndexGlobal;
            timerPresion = setTimeout(() => {
                seleccionar(div);
            }, 800);
        });

        div.addEventListener('pointerup', () => clearTimeout(timerPresion));
        div.addEventListener('pointermove', () => clearTimeout(timerPresion));

        document.getElementById('canvas-bg').appendChild(div);
        configurarInteract(div);
    }

    function seleccionar(el) {
        deseleccionar();
        notaActiva = el;
        el.classList.add('selected');
        document.getElementById('delete-tool').classList.add('enabled');
    }

    function deseleccionar() {
        if (notaActiva) {
            notaActiva.classList.remove('selected');
            notaActiva = null;
        }
        document.getElementById('delete-tool').classList.remove('enabled');
    }

    function eliminarNota() { if (notaActiva) { notaActiva.remove(); deseleccionar(); } }

    function configurarInteract(el) {
        interact(el)
        .draggable({
            allowFrom: '.handle',
            listeners: { move(event) {
                const t = event.target;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
            }}
        })
        .resizable({
            edges: { right: '.resize-dot', bottom: '.resize-dot' },
            listeners: { move(event) {
                // Solo redimensiona si la nota tiene el borde azul (seleccionada)
                if (!event.target.classList.contains('selected')) return;
                const t = event.target;
                t.style.width = event.rect.width + 'px';
                t.style.height = event.rect.height + 'px';
            }}
        });
    }

    // Paneo del lienzo
    interact('#canvas-bg').draggable({
        listeners: { move(event) {
            if (notaActiva) return;
            const t = event.target;
            const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
            const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
            t.style.transform = `translate(${x}px, ${y}px)`;
            t.setAttribute('data-x', x); t.setAttribute('data-y', y);
        }}
    });

    function ejecutarAccionMas() {
        const nom = prompt("Nombre de la materia:");
        if(nom) {
            db.materias.push({ id: Date.now(), nombre: nom });
            localStorage.setItem('mednotes_vUCV', JSON.stringify(db));
            const container = document.getElementById('content-list');
            container.innerHTML += `<div class="card" onclick="abrirLienzo()"><h3>${nom}</h3></div>`;
        }
    }
</script>
</body>
</html>
